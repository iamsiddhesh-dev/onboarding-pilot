services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./app.db
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    volumes:
      - ./backend/app:/app/app
      - ./frontend:/frontend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
